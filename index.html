<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WPS Duty Schedule</title>
    
    <!-- iPhone Home Screen Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WPS Duty">
    
    <!-- Custom Favicon & Apple Icon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%234F46E5%22/><text x=%2250%%22 y=%2250%%22 dominant-baseline=%22central%22 text-anchor=%22middle%22 fill=%22white%22 font-size=%2260%22 font-family=%22sans-serif%22 font-weight=%22bold%22>W</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%234F46E5%22/><text x=%2250%%22 y=%2250%%22 dominant-baseline=%22central%22 text-anchor=%22middle%22 fill=%22white%22 font-size=%2260%22 font-family=%22sans-serif%22 font-weight=%22bold%22>W</text></svg>">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        .safe-area-top { padding-top: env(safe-area-inset-top); }
        .duty-card { transition: transform 0.1s ease; }
        .duty-card:active { transform: scale(0.98); }
        
        /* Time-based color coding matching your sheet */
        .border-8-30 { border-left: 6px solid #FEF3C7; }
        .border-10-15 { border-left: 6px solid #D1FAE5; }
        .border-11-30 { border-left: 6px solid #DBEAFE; }
        .border-2-00 { border-left: 6px solid #FFEDD5; }
        .border-3-15 { border-left: 6px solid #F3E8FF; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-12">

    <!-- Header & Day Picker -->
    <div class="bg-indigo-600 text-white shadow-lg safe-area-top sticky top-0 z-50">
        <div class="px-4 py-4 text-center">
            <h1 class="text-xl font-bold tracking-tight">WPS Duty Schedule</h1>
            <p id="dateDisplay" class="text-[10px] opacity-70 uppercase tracking-widest mt-0.5">Cycle Day Selection</p>
        </div>
        
        <div class="flex justify-around bg-indigo-700 p-2 border-t border-indigo-500/30">
            <button onclick="setDay(1)" class="day-btn flex-1 mx-1 py-2 rounded-lg font-bold transition-all text-sm" id="btn-1">Day 1</button>
            <button onclick="setDay(2)" class="day-btn flex-1 mx-1 py-2 rounded-lg font-bold transition-all text-sm" id="btn-2">Day 2</button>
            <button onclick="setDay(3)" class="day-btn flex-1 mx-1 py-2 rounded-lg font-bold transition-all text-sm" id="btn-3">Day 3</button>
            <button onclick="setDay(4)" class="day-btn flex-1 mx-1 py-2 rounded-lg font-bold transition-all text-sm" id="btn-4">Day 4</button>
            <button onclick="setDay(5)" class="day-btn flex-1 mx-1 py-2 rounded-lg font-bold transition-all text-sm" id="btn-5">Day 5</button>
        </div>
    </div>

    <!-- Main Content Area -->
    <div id="content" class="p-4 space-y-4">
        <div class="flex flex-col justify-center items-center h-64 text-gray-400">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-indigo-600 mb-4"></div>
            <p class="animate-pulse">Fetching live schedule...</p>
        </div>
    </div>

    <!-- Alert Modal -->
    <div id="msgBox" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[100] p-6">
        <div class="bg-white rounded-3xl p-8 w-full max-w-xs text-center shadow-2xl">
            <div class="text-indigo-600 mb-4">
                <svg class="w-12 h-12 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
            <p id="msgText" class="text-gray-800 font-medium mb-6"></p>
            <button onclick="closeMsg()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold shadow-lg active:bg-indigo-700">Got it</button>
        </div>
    </div>

    <script>
        // Your specific Google Apps Script URL
        const API_URL = "https://script.google.com/macros/s/AKfycbxl9knVtJHmncdq05-TrsiLWOOGJhLAIEmPZCdJy78wihz3RaDyo1z4AdTF4Ufwt2kz/exec"; 

        let scheduleData = [];
        let currentDay = 1;

        async function fetchSchedule() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Network response was not ok');
                scheduleData = await response.json();
                renderSchedule();
            } catch (err) {
                showMsg("Couldn't connect to the schedule. Please check your internet connection.");
                console.error(err);
            }
        }

        function setDay(day) {
            currentDay = day;
            
            // Update UI buttons
            document.querySelectorAll('.day-btn').forEach(btn => {
                btn.classList.remove('bg-white', 'text-indigo-700', 'shadow-md');
                btn.classList.add('text-indigo-200');
            });
            const activeBtn = document.getElementById('btn-' + day);
            activeBtn.classList.remove('text-indigo-200');
            activeBtn.classList.add('bg-white', 'text-indigo-700', 'shadow-md');

            renderSchedule();
        }

        function renderSchedule() {
            if (!scheduleData || scheduleData.length === 0) return;

            const content = document.getElementById('content');
            content.innerHTML = '';

            // Day index mapping (Column C=2...G=6)
            const colIndex = currentDay + 1;
            
            let lastTimeSlot = "";

            // Skip header row
            for (let i = 1; i < scheduleData.length; i++) {
                const row = scheduleData[i];
                const timeSlot = row[0] ? row[0].toString().trim() : "";
                const location = row[1] ? row[1].toString().trim() : "";
                const staff = row[colIndex] ? row[colIndex].toString().trim() : "";
                const indoorLoc = row[7] ? row[7].toString().trim() : "";

                // Skip completely empty rows
                if (!location && !staff && !timeSlot) continue;
                
                // If there's a new time slot, create a header
                if (timeSlot && timeSlot !== lastTimeSlot) {
                    lastTimeSlot = timeSlot;
                    const borderClass = "border-" + timeSlot.replace(':', '-').split(' ')[0];
                    
                    const header = document.createElement('div');
                    header.className = `mt-6 mb-2 px-3 py-1 text-sm font-bold text-gray-500 uppercase tracking-widest flex items-center bg-gray-100/50 rounded-r-lg ${borderClass}`;
                    header.innerText = timeSlot;
                    content.appendChild(header);
                }

                // Only render if there's a location (some rows are time-headers only)
                if (location) {
                    const card = document.createElement('div');
                    card.className = "duty-card bg-white rounded-2xl p-4 shadow-sm border border-gray-100";
                    
                    const hasIndoor = (indoorLoc && !["n/a", "N/A", "-"].includes(indoorLoc));
                    const indoorSection = hasIndoor 
                        ? `<div class="mt-3 pt-3 border-t border-gray-50 flex items-start gap-2">
                             <div class="bg-red-50 p-1.5 rounded-lg">
                               <svg class="w-3.5 h-3.5 text-red-500" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
                             </div>
                             <div>
                               <p class="text-[10px] font-bold text-gray-400 uppercase leading-none mb-1">Indoor Recess</p>
                               <p class="text-sm text-gray-700 font-semibold">${indoorLoc}</p>
                             </div>
                           </div>` 
                        : "";

                    card.innerHTML = `
                        <div class="flex justify-between items-start gap-4">
                            <div class="flex-1">
                                <p class="text-[10px] font-bold text-indigo-400 uppercase tracking-wider mb-1">Location</p>
                                <p class="text-base font-bold text-gray-900 leading-tight">${location}</p>
                            </div>
                            <div class="flex-1 text-right">
                                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1">Staff Assigned</p>
                                <p class="text-base font-bold text-indigo-700 leading-tight">${staff || '---'}</p>
                            </div>
                        </div>
                        ${indoorSection}
                    `;
                    content.appendChild(card);
                }
            }
        }

        function showMsg(text) {
            document.getElementById('msgText').innerText = text;
            document.getElementById('msgBox').classList.remove('hidden');
        }

        function closeMsg() {
            document.getElementById('msgBox').classList.add('hidden');
        }

        window.onload = () => {
            setDay(1);
            fetchSchedule();
        };
    </script>
</body>
</html>
